# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "en-US"
tone_instructions: "Direct and terse. No praise, filler, or diff narration. Plain ASCII only: no emoji, no em or en dashes, no smart quotes. Never suggest adding code comments or docstrings; prefer renaming or restructuring for clarity."

reviews:
  profile: "chill"
  poem: false
  sequence_diagrams: false
  in_progress_fortune: false
  path_instructions:
    - path: "action.yml"
      instructions: >-
        Composite GitHub Action consumed by third parties. Action inputs must never
        be interpolated directly into run lines (command injection); pass them
        through env. External actions must be SHA-pinned. Outputs, annotations, and
        job summaries must only carry redacted skarn output, never raw session
        content.
    - path: "scripts/scan.sh"
      instructions: >-
        Wrapper around skarn check running in untrusted CI. Quote every expansion,
        keep set -euo pipefail, never echo tokens or raw session content, keep SARIF
        and summary surfaces redacted, and propagate the severity and risk gate exit
        codes unchanged.
    - path: "{examples,pre-commit,trunk}/**"
      instructions: >-
        Published integration surfaces; keep flags and semantics consistent with
        action.yml and the skarn CLI, and keep example workflows SHA-pinned.
  auto_review:
    enabled: true
    drafts: false
  finishing_touches:
    docstrings:
      enabled: false
  pre_merge_checks:
    title:
      mode: "warning"
      requirements: "Conventional Commits form type(scope): description, type one of feat, fix, refactor, docs, test, chore, perf, ci. Lowercase description, no trailing period, under 80 characters, ASCII only, single hyphens only."
  tools:
    markdownlint:
      enabled: false

chat:
  auto_reply: true
